<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">SQLite vs PostgreSQL comparison board</title>
  <desc id="desc">A two-column comparison board highlighting when to choose SQLite versus PostgreSQL for software projects.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#eef3fb"/>
    </linearGradient>
    <linearGradient id="headerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f3a66"/>
      <stop offset="100%" stop-color="#244c84"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#27466a" flood-opacity="0.14"/>
    </filter>
    <style><![CDATA[
      .title { fill: #ffffff; font: 700 38px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .subtitle { fill: #dbe9ff; font: 500 20px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .banner-label { fill: #5d4a17; font: 700 20px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .banner-copy { fill: #5d4a17; font: 400 17px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .header-cell { fill: #44546b; font: 700 20px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .sqlite-head { fill: #1f5bc1; font: 700 24px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .postgres-head { fill: #1f7a3b; font: 700 24px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .row-label { fill: #334155; font: 600 19px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .body-copy { fill: #23324a; font: 400 18px "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1200" height="780" fill="url(#pageBg)"/>
  <rect x="32" y="24" width="1136" height="732" rx="20" fill="#ffffff" filter="url(#cardShadow)"/>

  <rect x="32" y="24" width="1136" height="112" rx="20" fill="url(#headerBg)"/>
  <rect x="32" y="116" width="1136" height="20" fill="url(#headerBg)"/>
  <text class="title" x="72" y="74">SQLite vs PostgreSQL</text>
  <text class="subtitle" x="72" y="98">
    <tspan x="72" dy="0">A practical database choice guide for modern</tspan>
    <tspan x="72" dy="22">product and platform teams</tspan>
  </text>

  <rect x="64" y="152" width="1072" height="76" rx="12" fill="#fef6dd" stroke="#f2d68c" stroke-width="1.5"/>
  <text class="banner-label" x="88" y="183">Recommendation</text>
  <text class="banner-copy" x="262" y="182">
    <tspan x="262" dy="0">Pick SQLite for local-first or lightweight apps.</tspan>
    <tspan x="262" dy="22">Pick PostgreSQL for multi-user systems and scale.</tspan>
  </text>

  <rect x="64" y="248" width="1072" height="476" rx="12" fill="#fbfcfe" stroke="#d9e2ef" stroke-width="1.5"/>
  <rect x="304" y="248" width="416" height="476" fill="#f6f9ff"/>
  <rect x="720" y="248" width="416" height="476" fill="#f5fbf5"/>

  <line x1="64" y1="308" x2="1136" y2="308" stroke="#d9e2ef" stroke-width="1.5"/>
  <line x1="64" y1="380" x2="1136" y2="380" stroke="#d9e2ef" stroke-width="1.2"/>
  <line x1="64" y1="452" x2="1136" y2="452" stroke="#d9e2ef" stroke-width="1.2"/>
  <line x1="64" y1="524" x2="1136" y2="524" stroke="#d9e2ef" stroke-width="1.2"/>
  <line x1="64" y1="596" x2="1136" y2="596" stroke="#d9e2ef" stroke-width="1.2"/>
  <line x1="64" y1="668" x2="1136" y2="668" stroke="#d9e2ef" stroke-width="1.2"/>

  <line x1="304" y1="248" x2="304" y2="724" stroke="#d9e2ef" stroke-width="1.5"/>
  <line x1="720" y1="248" x2="720" y2="724" stroke="#d9e2ef" stroke-width="1.5"/>

  <text class="header-cell" x="96" y="286">Decision Area</text>
  <text class="sqlite-head" x="512" y="286" text-anchor="middle">SQLite</text>
  <text class="postgres-head" x="928" y="286" text-anchor="middle">PostgreSQL</text>

  <text class="row-label" x="96" y="354">Ideal for</text>
  <text class="body-copy" x="328" y="354">Single-user apps, edge devices, desktop tools</text>
  <text class="body-copy" x="744" y="354">Shared apps, SaaS platforms, data-heavy backends</text>

  <text class="row-label" x="96" y="426">Setup and operations</text>
  <text class="body-copy" x="328" y="426">Zero-admin file database; fastest to start</text>
  <text class="body-copy" x="744" y="426">Server-based; more setup, stronger control</text>

  <text class="row-label" x="96" y="498">Concurrency model</text>
  <text class="body-copy" x="328" y="498">Many readers, limited concurrent writers</text>
  <text class="body-copy" x="744" y="498">High concurrent reads and writes by design</text>

  <text class="row-label" x="96" y="570">Feature depth</text>
  <text class="body-copy" x="328" y="570">Core SQL, compact footprint, minimal overhead</text>
  <text class="body-copy" x="744" y="570">Advanced indexing, extensions, rich SQL tooling</text>

  <text class="row-label" x="96" y="642">Scalability</text>
  <text class="body-copy" x="328" y="642">Best for small-to-medium local workloads</text>
  <text class="body-copy" x="744" y="642">Built for large datasets and sustained growth</text>

  <text class="row-label" x="96" y="714">Cost profile</text>
  <text class="body-copy" x="328" y="714">Lowest ops cost; great for embedded deployments</text>
  <text class="body-copy" x="744" y="714">Higher ops effort; better ROI at production scale</text>
</svg>
